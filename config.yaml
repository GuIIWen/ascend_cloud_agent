# Agent配置文件

# Embedding模型配置
embedding:
  provider: "custom"  # custom/openai/huggingface
  api_url: "https://your-embedding-api.com/v1/embeddings"
  api_key: "${EMBEDDING_API_KEY}"
  model_name: "bge-large-zh-v1.5"
  dimension: 1024
  batch_size: 32
  timeout: 30

# Rerank模型配置
rerank:
  provider: "custom"
  api_url: "https://your-rerank-api.com/v1/rerank"
  api_key: "${RERANK_API_KEY}"
  model_name: "bge-reranker-v2-m3"
  top_k: 5  # 返回top5结果
  timeout: 10

# 代码生成LLM配置
llm:
  provider: "custom"  # custom/openai/anthropic/qwen
  api_url: "https://your-llm-api.com/v1/chat/completions"
  api_key: "${LLM_API_KEY}"
  model_name: "qwen-coder-plus"
  temperature: 0.2
  max_tokens: 4096
  timeout: 60

# 向量数据库配置
vector_db:
  type: "faiss"  # faiss/milvus/chroma
  index_path: "./data/api_index"
  dimension: 1024

# 项目配置
project:
  source_path: "./src/main/java"
  test_path: "./src/test/java"
  scan_interval: 300  # 秒，自动扫描间隔
